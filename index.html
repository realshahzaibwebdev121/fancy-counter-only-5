<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fancy Counter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="counter">
        <h1 class="counter__title">Fancy Counter</h1>
        <span class="counter__value">0</span>
        <button class="counter__reset-button">
            <i class="fa-solid fa-arrows-rotate counter__reset-icon"></i>
        </button>
        <div class="counter__buttons">
            <button class="counter__button counter__button--decrease">
                <i class="fa-solid fa-minus  counter__icon counter__icon--minus"></i>
            </button>
            <button class="counter__button counter__button--increase">
                <i class="fa-solid fa-plus counter__icon counter__icon--plus"></i>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
